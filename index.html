
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>交接管理系統｜正式版雛形</title>
  <style>
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --primary:#111827; --accent:#4f46e5; --ok:#16a34a; --warn:#d97706; --info:#2563eb;
      --danger:#dc2626; --chip:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans TC,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none !important}
    .app{max-width:1280px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;gap:16px}
    .title{font-size:28px;font-weight:800}
    .sub{font-size:13px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:220px 1fr;gap:20px;margin-top:20px}
    .sidebar{padding:14px}
    .navbtn{width:100%;padding:12px 14px;border-radius:14px;border:none;background:transparent;text-align:left;font-size:14px;font-weight:700;cursor:pointer}
    .navbtn.active{background:var(--primary);color:#fff}
    .navbtn:hover{background:#f3f4f6}
    .navbtn.active:hover{background:var(--primary)}
    .content{display:grid;gap:20px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .stat{padding:18px}
    .stat .num{font-size:34px;font-weight:900;margin-top:8px}
    .section{padding:18px}
    .section h2{margin:0 0 14px;font-size:22px}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    input,select,textarea,button{
      font:inherit
    }
    input,select,textarea{
      width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff
    }
    textarea{min-height:120px;resize:vertical}
    .btn{border:none;border-radius:14px;padding:11px 16px;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--primary);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .item{padding:16px;border:1px solid var(--border);border-radius:18px;background:#fff}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:5px 10px;border-radius:999px;background:var(--chip);font-size:12px;font-weight:700}
    .chip.ok{background:#dcfce7;color:#166534}
    .chip.info{background:#dbeafe;color:#1d4ed8}
    .chip.warn{background:#fef3c7;color:#92400e}
    .chip.neutral{background:#e5e7eb;color:#374151}
    .storecard{padding:16px;cursor:pointer;transition:.15s transform,.15s box-shadow}
    .storecard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .progress{height:10px;background:#edf2f7;border-radius:999px;overflow:hidden;margin-top:12px}
    .bar{height:100%;background:var(--accent)}
    .muted{color:var(--muted)}
    .small{font-size:13px}
    .list{display:grid;gap:12px}
    .login-wrap{max-width:980px;margin:36px auto;padding:20px;display:grid;grid-template-columns:1.2fr .9fr;gap:20px}
    .hero{padding:28px}
    .login{padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 140px;gap:10px}
    .search-block{display:grid;gap:12px}
    .divider{height:1px;background:var(--border);margin:12px 0}
    .right{margin-left:auto}
    .warnbox{padding:12px 14px;border-radius:14px;background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .okbox{padding:12px 14px;border-radius:14px;background:#ecfdf5;color:#166534;border:1px solid #a7f3d0}
    .badge{display:inline-block;background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .empty{padding:26px;text-align:center;border-radius:16px;background:#f8fafc;color:var(--muted)}
    mark{background:#fde68a;padding:0 2px;border-radius:4px}
    .table{width:100%;border-collapse:collapse}
    .table th,.table td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:14px}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .w240{width:240px}
    .w180{width:180px}
    .w140{width:140px}
    @media (max-width: 980px){
      .layout,.login-wrap{grid-template-columns:1fr}
      .grid4{grid-template-columns:1fr 1fr}
      .grid2,.form-grid{grid-template-columns:1fr}
      .app{padding:12px}
      .title{font-size:22px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const STORAGE_KEY = 'handover-formal-v1';

const shifts = ['早班','中班','晚班'];
const categories = ['人員','事情','宣導','保全','廚房','其他'];
const statuses = {
  pending: { label:'待處理', cls:'neutral' },
  in_progress: { label:'處理中', cls:'info' },
  done: { label:'已完成', cls:'ok' },
  pending_followup: { label:'待追蹤', cls:'warn' }
};

const seedUsers = [
  { account:'admin', password:'123456', name:'系統管理員', role:'admin', storeId:null },
  { account:'manager_a', password:'123456', name:'王店長', role:'general_manager', storeId:null },
  { account:'supervisor_a', password:'123456', name:'A店主管', role:'store_supervisor', storeId:'A' },
];

const seedStores = [
  { id:'A', name:'A店' }, { id:'B', name:'B店' }, { id:'C', name:'C店' }, { id:'D', name:'D店' }
];

function makeDates() {
  const out=[];
  for(let i=0;i<10;i++){
    const d=new Date();
    d.setDate(d.getDate()-2+i);
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,'0');
    const day=String(d.getDate()).padStart(2,'0');
    out.push(`${y}-${m}-${day}`);
  }
  return out;
}
const dateRange = makeDates();

const baseByCategory = {
  人員:['新人報到，安排收銀訓練。','中班臨時請假 1 人，已調班支援。'],
  事情:['今日待辦已列入交接，晚班接續處理。','現場流程需再確認，已先記錄。'],
  宣導:['已提醒同仁注意服務話術。','已公告本週作業重點。'],
  保全:['閉店前已確認門窗與警報設定。','監視器畫面正常，持續留意。'],
  廚房:['備料數量已補足，晚班續用。','廚房清潔完成，器具已歸位。'],
  其他:['明日促銷立牌已擺放。','群組公告已通知全員。']
};

function makeSeedItems() {
  const result = {};
  const statusKeys = Object.keys(statuses);
  dateRange.forEach((date, di) => {
    result[date] = {};
    shifts.forEach((shift, si) => {
      result[date][shift] = {};
      seedStores.forEach((store, ti) => {
        const count = 2 + ((di + si + ti) % 2);
        result[date][shift][store.id] = Array.from({length: count}, (_, n) => {
          const category = categories[(di + si + ti + n) % categories.length];
          return {
            id: `${date}-${shift}-${store.id}-${n}`,
            category,
            content: baseByCategory[category][(di + n) % 2],
            status: statusKeys[(di + si + ti + n) % statusKeys.length],
            carried: (di + si + ti + n) % 3 === 0,
            createdBy: store.id === 'A' ? 'A店主管' : '系統',
            createdAt: new Date().toLocaleString('zh-TW')
          };
        });
      });
    });
  });
  return result;
}

const seedAnnouncements = [
  { id:'a1', title:'照片規範', content:'請上傳清楚且含時間浮水印的照片。', targetStoreId:null, createdBy:'系統管理員', createdAt:new Date().toLocaleString('zh-TW') },
  { id:'a2', title:'A店冰箱', content:'A店本週每班需複核一次冰箱溫度。', targetStoreId:'A', createdBy:'王店長', createdAt:new Date().toLocaleString('zh-TW') },
];

function initialData() {
  return {
    users: structuredClone(seedUsers),
    stores: structuredClone(seedStores),
    itemsByStore: makeSeedItems(),
    announcements: structuredClone(seedAnnouncements),
  };
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return initialData();
    return { ...initialData(), ...JSON.parse(raw) };
  } catch {
    return initialData();
  }
}

let state = {
  ...load(),
  currentUser: null,
  account: 'admin',
  password: '123456',
  loginError: '',
  tab: 'dashboard',
  selectedDate: dateRange[Math.max(0, dateRange.length-3)],
  selectedShift: '晚班',
  selectedStore: 'A',
  searchText: '',
  newItemCategory: '人員',
  newItemContent: '',
  newItemStatus: 'pending',
  newAnnouncementTitle: '',
  newAnnouncementContent: '',
  newAnnouncementStore: 'all',
  newUserName: '',
  newUserAccount: '',
  newUserPassword: '123456',
  newUserRole: 'store_supervisor',
  newUserStore: 'A',
};

function persist() {
  const { users, stores, itemsByStore, announcements } = state;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ users, stores, itemsByStore, announcements }));
}

function setState(patch) {
  Object.assign(state, patch);
  persist();
  render();
}

function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function highlightText(text, keyword) {
  const src = String(text ?? '');
  const q = String(keyword ?? '').trim();
  if (!q) return escapeHtml(src);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escapeHtml(src).replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

function visibleStores() {
  if (state.currentUser?.role === 'store_supervisor') return state.stores.filter(s => s.id === state.currentUser.storeId);
  return state.stores;
}
function effectiveStore() {
  return state.currentUser?.role === 'store_supervisor' ? state.currentUser.storeId : state.selectedStore;
}
function currentItems() {
  return state.itemsByStore?.[state.selectedDate]?.[state.selectedShift]?.[effectiveStore()] || [];
}
function dashboardRows() {
  return visibleStores().map(store => {
    const list = state.itemsByStore?.[state.selectedDate]?.[state.selectedShift]?.[store.id] || [];
    const total = list.length;
    const done = list.filter(i => i.status === 'done').length;
    const abnormal = list.filter(i => i.status === 'pending' || i.status === 'pending_followup').length;
    const progress = total ? Math.round(done / total * 100) : 0;
    return { ...store, total, done, abnormal, progress };
  });
}
function totals() {
  const rows = dashboardRows();
  return {
    totalItems: rows.reduce((a,b)=>a+b.total,0),
    totalDone: rows.reduce((a,b)=>a+b.done,0),
    totalAbnormal: rows.reduce((a,b)=>a+b.abnormal,0),
    avgProgress: rows.length ? Math.round(rows.reduce((a,b)=>a+b.progress,0)/rows.length) : 0
  };
}
function filteredItems() {
  const q = state.searchText.trim().toLowerCase();
  return currentItems().filter(item => !q || item.content.toLowerCase().includes(q) || item.category.toLowerCase().includes(q));
}
function globalResults() {
  const q = state.searchText.trim().toLowerCase();
  if (!q) return { stores:[], items:[], announcements:[], users:[] };
  const storeResults = visibleStores().filter(s => s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  const itemResults = visibleStores().flatMap(store => {
    const list = state.itemsByStore?.[state.selectedDate]?.[state.selectedShift]?.[store.id] || [];
    return list.filter(item => item.content.toLowerCase().includes(q) || item.category.toLowerCase().includes(q))
      .map(item => ({...item, storeName:store.name, storeId:store.id}));
  });
  const announcementResults = state.announcements.filter(a => {
    const canView = !a.targetStoreId || a.targetStoreId === effectiveStore() || state.currentUser?.role !== 'store_supervisor';
    return canView && (a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q) || a.createdBy.toLowerCase().includes(q));
  });
  const userResults = state.currentUser?.role === 'admin'
    ? state.users.filter(u => u.name.toLowerCase().includes(q) || u.account.toLowerCase().includes(q) || u.role.toLowerCase().includes(q))
    : [];
  return { stores:storeResults, items:itemResults, announcements:announcementResults, users:userResults };
}

function login() {
  const found = state.users.find(u => u.account === state.account && u.password === state.password);
  if (!found) return setState({ loginError:'帳號或密碼錯誤' });
  setState({ currentUser: found, loginError:'', selectedStore: found.storeId || state.selectedStore });
}
function logout() {
  setState({ currentUser:null, tab:'dashboard', searchText:'' });
}
function resetData() {
  const fresh = initialData();
  setState({ ...fresh, tab:'dashboard', searchText:'', selectedStore:'A' });
}
function openStore(storeId) { setState({ selectedStore:storeId, tab:'forms' }); }
function addItem() {
  const content = state.newItemContent.trim();
  if (!content) return;
  const date = state.selectedDate, shift = state.selectedShift, store = effectiveStore();
  const next = {
    id:`i-${Date.now()}`, category:state.newItemCategory, content,
    status:state.newItemStatus, carried:false,
    createdBy: state.currentUser?.name || '系統',
    createdAt: new Date().toLocaleString('zh-TW')
  };
  state.itemsByStore[date] ??= {};
  state.itemsByStore[date][shift] ??= {};
  state.itemsByStore[date][shift][store] ??= [];
  state.itemsByStore[date][shift][store].unshift(next);
  setState({ itemsByStore: state.itemsByStore, newItemContent:'', newItemCategory:'人員', newItemStatus:'pending' });
}
function updateStatus(id, value) {
  const list = currentItems();
  const item = list.find(x => x.id === id);
  if (item) item.status = value;
  setState({ itemsByStore: state.itemsByStore });
}
function addAnnouncement() {
  const title = state.newAnnouncementTitle.trim();
  const content = state.newAnnouncementContent.trim();
  if (!title || !content || !state.currentUser) return;
  state.announcements.unshift({
    id:`a-${Date.now()}`, title, content,
    targetStoreId: state.newAnnouncementStore === 'all' ? null : state.newAnnouncementStore,
    createdBy: state.currentUser.name,
    createdAt: new Date().toLocaleString('zh-TW')
  });
  setState({ announcements: state.announcements, newAnnouncementTitle:'', newAnnouncementContent:'', newAnnouncementStore:'all' });
}
function addUser() {
  const name = state.newUserName.trim(), account = state.newUserAccount.trim();
  if (!name || !account) return alert('請輸入姓名與帳號');
  if (state.users.some(u => u.account === account)) return alert('帳號已存在');
  const storeId = state.newUserRole === 'store_supervisor' ? state.newUserStore : null;
  state.users.unshift({ account, password: state.newUserPassword || '123456', name, role: state.newUserRole, storeId });
  setState({ users: state.users, newUserName:'', newUserAccount:'', newUserPassword:'123456' });
}
function deleteZipIfWanted() {
  alert('目前可以先不用刪 ZIP，系統已可正常顯示。之後整理版本時再刪即可。');
}

function optionHtml(arr, value) {
  return arr.map(v => `<option value="${escapeHtml(v)}" ${String(value)===String(v)?'selected':''}>${escapeHtml(v)}</option>`).join('');
}
function storeOptionsHtml(value) {
  return state.stores.map(s => `<option value="${s.id}" ${String(value)===String(s.id)?'selected':''}>${escapeHtml(s.name)}</option>`).join('');
}

function renderLogin(root) {
  root.innerHTML = `
  <div class="login-wrap">
    <div class="card hero">
      <div class="badge">正式版雛形</div>
      <div class="title" style="margin-top:12px">交接管理系統</div>
      <p class="muted" style="font-size:18px;line-height:1.8">這版已具備登入、總覽、交接、公告、帳號管理、搜尋高亮與本機保存功能，適合先正式試跑流程。</p>
      <div class="grid4" style="margin-top:18px">
        <div class="card stat"><div class="sub">店別</div><div class="num">${state.stores.length}</div><div class="sub">可擴充管理</div></div>
        <div class="card stat"><div class="sub">角色</div><div class="num">3</div><div class="sub">管理員 / 總經理 / 店主管</div></div>
        <div class="card stat"><div class="sub">模組</div><div class="num">4</div><div class="sub">總覽 / 交接 / 公告 / 帳號</div></div>
        <div class="card stat"><div class="sub">保存</div><div class="num">本機</div><div class="sub">下一步可接 Firebase</div></div>
      </div>
    </div>
    <div class="card login">
      <h2 style="margin-top:0">登入系統</h2>
      <div class="warnbox">目前為正式版雛形，資料保存在瀏覽器。若要多人同步，下一步需接雲端資料庫。</div>
      <div class="divider"></div>
      <div class="small muted">測試帳號</div>
      <div class="small">admin / 123456</div>
      <div class="small">manager_a / 123456</div>
      <div class="small">supervisor_a / 123456</div>
      <div style="height:12px"></div>
      <label class="small muted">帳號</label>
      <input id="accountInput" value="${escapeHtml(state.account)}">
      <div style="height:10px"></div>
      <label class="small muted">密碼</label>
      <input id="passwordInput" type="password" value="${escapeHtml(state.password)}">
      ${state.loginError ? `<div style="height:10px"></div><div class="warnbox">${escapeHtml(state.loginError)}</div>` : ''}
      <div style="height:14px"></div>
      <button class="btn primary" style="width:100%" onclick="loginFromUI()">進入系統</button>
    </div>
  </div>`;
  document.getElementById('accountInput').oninput = e => state.account = e.target.value;
  document.getElementById('passwordInput').oninput = e => state.password = e.target.value;
}
function renderDashboard() {
  const t = totals();
  const rows = dashboardRows();
  const results = globalResults();
  if (!state.searchText.trim()) {
    return `
    <div class="grid4">
      <div class="card stat"><div class="sub">交接總數</div><div class="num">${t.totalItems}</div><div class="sub">目前合計</div></div>
      <div class="card stat"><div class="sub">已完成</div><div class="num">${t.totalDone}</div><div class="sub">完成數</div></div>
      <div class="card stat"><div class="sub">待處理</div><div class="num">${t.totalAbnormal}</div><div class="sub">需追蹤</div></div>
      <div class="card stat"><div class="sub">平均進度</div><div class="num">${t.avgProgress}%</div><div class="sub">全店平均</div></div>
    </div>
    <div class="card section">
      <h2>各店進度</h2>
      <div class="grid4">
        ${rows.map(row => `
          <div class="card storecard" onclick="openStoreFromUI('${row.id}')">
            <div class="row" style="justify-content:space-between;align-items:center">
              <div style="font-size:20px;font-weight:800">${escapeHtml(row.name)}</div>
              <div class="chip">${row.total} 項</div>
            </div>
            <div class="progress"><div class="bar" style="width:${row.progress}%"></div></div>
            <div class="small muted" style="margin-top:8px">完成 ${row.progress}%</div>
            <div class="grid2" style="margin-top:12px">
              <div class="card stat" style="padding:12px"><div class="sub">已完成</div><div class="num" style="font-size:22px">${row.done}</div></div>
              <div class="card stat" style="padding:12px"><div class="sub">待處理</div><div class="num" style="font-size:22px">${row.abnormal}</div></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }
  return `
  <div class="card section">
    <h2>全站搜尋</h2>
    <div class="search-block">
      <div class="item"><div class="small muted">店別 ${results.stores.length}</div>${results.stores.length ? results.stores.map(s => `<div style="margin-top:8px">${highlightText(`${s.id}｜${s.name}`, state.searchText)}</div>`).join('') : '<div class="empty">找不到店別</div>'}</div>
      <div class="item"><div class="small muted">交接 ${results.items.length}</div>${results.items.length ? results.items.map(i => `<div style="margin-top:10px"><div class="small muted">${escapeHtml(i.storeName)}｜${escapeHtml(i.category)}</div><div>${highlightText(i.content, state.searchText)}</div></div>`).join('') : '<div class="empty">找不到交接</div>'}</div>
      <div class="item"><div class="small muted">公告 ${results.announcements.length}</div>${results.announcements.length ? results.announcements.map(a => `<div style="margin-top:10px"><div style="font-weight:800">${highlightText(a.title, state.searchText)}</div><div class="small muted">${escapeHtml(a.createdBy)}｜${escapeHtml(a.createdAt)}</div><div>${highlightText(a.content, state.searchText)}</div></div>`).join('') : '<div class="empty">找不到公告</div>'}</div>
      ${state.currentUser.role === 'admin' ? `<div class="item"><div class="small muted">帳號 ${results.users.length}</div>${results.users.length ? results.users.map(u => `<div style="margin-top:10px">${highlightText(`${u.name}｜${u.account}｜${u.role}${u.storeId ? `｜${u.storeId}店` : ''}`, state.searchText)}</div>`).join('') : '<div class="empty">找不到帳號</div>'}</div>` : ''}
    </div>
  </div>`;
}
function itemCard(item) {
  return `
  <div class="item">
    <div class="chips">
      <span class="chip">${escapeHtml(item.category)}</span>
      <span class="chip ${statuses[item.status].cls}">${escapeHtml(statuses[item.status].label)}</span>
      ${item.carried ? `<span class="chip">續延</span>` : ''}
    </div>
    <div style="margin-top:12px;line-height:1.8">${highlightText(item.content, state.searchText)}</div>
    <div class="small muted" style="margin-top:8px">${escapeHtml(item.createdBy || '')}｜${escapeHtml(item.createdAt || '')}</div>
    <div style="margin-top:12px">
      <select onchange="updateStatusFromUI('${item.id}', this.value)">
        ${Object.keys(statuses).map(k => `<option value="${k}" ${item.status===k?'selected':''}>${statuses[k].label}</option>`).join('')}
      </select>
    </div>
  </div>`;
}
function renderForms() {
  const items = filteredItems();
  return `
  <div class="card section">
    <h2>新增交接</h2>
    <div class="form-grid">
      <select id="newCategory">${optionHtml(categories, state.newItemCategory)}</select>
      <input id="newContent" placeholder="輸入交接內容" value="${escapeHtml(state.newItemContent)}">
      <select id="newStatus">${Object.keys(statuses).map(k => `<option value="${k}" ${state.newItemStatus===k?'selected':''}>${statuses[k].label}</option>`).join('')}</select>
      <button class="btn primary" onclick="addItemFromUI()">新增</button>
    </div>
  </div>
  <div class="card section">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2 style="margin:0">交接事項</h2>
      <div class="toolbar">
        <input class="w180" type="date" id="dateInput" value="${escapeHtml(state.selectedDate)}">
        <select class="w140" id="shiftInput">${optionHtml(shifts, state.selectedShift)}</select>
        <select class="w180" id="storeInput" ${state.currentUser.role==='store_supervisor'?'disabled':''}>${storeOptionsHtml(effectiveStore())}</select>
      </div>
    </div>
    <div style="height:12px"></div>
    ${items.length ? `<div class="list">${items.map(itemCard).join('')}</div>` : `<div class="empty">目前沒有資料</div>`}
  </div>`;
}
function renderAnnouncements() {
  const list = state.announcements.filter(a => !a.targetStoreId || a.targetStoreId === effectiveStore() || state.currentUser.role !== 'store_supervisor');
  return `
  <div class="grid2">
    <div class="card section">
      <h2>發公告</h2>
      <input id="annTitle" placeholder="標題" value="${escapeHtml(state.newAnnouncementTitle)}">
      <div style="height:10px"></div>
      <textarea id="annContent" placeholder="內容">${escapeHtml(state.newAnnouncementContent)}</textarea>
      <div style="height:10px"></div>
      <select id="annStore">
        <option value="all" ${state.newAnnouncementStore==='all'?'selected':''}>全店</option>
        ${storeOptionsHtml(state.newAnnouncementStore)}
      </select>
      <div style="height:12px"></div>
      <button class="btn primary" onclick="addAnnouncementFromUI()">發公告</button>
    </div>
    <div class="card section">
      <h2>公告清單</h2>
      <div class="list">
      ${list.map(a => `
        <div class="item">
          <div class="row" style="justify-content:space-between;align-items:flex-start">
            <div>
              <div style="font-size:18px;font-weight:800">${escapeHtml(a.title)}</div>
              <div class="small muted">${escapeHtml(a.createdBy)}｜${escapeHtml(a.createdAt)}</div>
            </div>
            <div class="chip">${a.targetStoreId ? escapeHtml(a.targetStoreId + '店') : '全店'}</div>
          </div>
          <div style="margin-top:10px;line-height:1.8">${highlightText(a.content, state.searchText)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function renderUsers() {
  return `
  <div class="card section">
    <h2>建立帳號</h2>
    <div class="form-grid">
      <input id="userName" placeholder="姓名" value="${escapeHtml(state.newUserName)}">
      <input id="userAccount" placeholder="帳號" value="${escapeHtml(state.newUserAccount)}">
      <input id="userPassword" placeholder="密碼" value="${escapeHtml(state.newUserPassword)}">
      <button class="btn primary" onclick="addUserFromUI()">建立</button>
    </div>
    <div class="row" style="margin-top:10px">
      <select class="w240" id="userRole">
        <option value="admin" ${state.newUserRole==='admin'?'selected':''}>admin</option>
        <option value="general_manager" ${state.newUserRole==='general_manager'?'selected':''}>general_manager</option>
        <option value="store_supervisor" ${state.newUserRole==='store_supervisor'?'selected':''}>store_supervisor</option>
      </select>
      <select class="w180" id="userStore">${storeOptionsHtml(state.newUserStore)}</select>
    </div>
  </div>
  <div class="card section">
    <h2>帳號清單</h2>
    <table class="table">
      <thead><tr><th>姓名</th><th>帳號</th><th>角色</th><th>店別</th></tr></thead>
      <tbody>
        ${state.users.map(u => `<tr><td>${escapeHtml(u.name)}</td><td>${escapeHtml(u.account)}</td><td>${escapeHtml(u.role)}</td><td>${escapeHtml(u.storeId || '-')}</td></tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderApp(root) {
  const roleLabel = state.currentUser.role === 'admin' ? '管理員' : state.currentUser.role === 'general_manager' ? '總經理' : '店主管';
  const main = state.tab === 'dashboard' ? renderDashboard()
    : state.tab === 'forms' ? renderForms()
    : state.tab === 'announcements' ? renderAnnouncements()
    : renderUsers();

  root.innerHTML = `
  <div class="app">
    <div class="card topbar">
      <div>
        <div class="title">交接管理後台</div>
        <div class="sub">${escapeHtml(state.currentUser.name)}｜${roleLabel}｜${escapeHtml(state.selectedDate)}｜${escapeHtml(state.selectedShift)}</div>
      </div>
      <div class="top-actions">
        <input class="w240" id="searchInput" placeholder="全站搜尋" value="${escapeHtml(state.searchText)}">
        <button class="btn secondary" onclick="resetDataFromUI()">重設資料</button>
        <button class="btn primary" onclick="logoutFromUI()">登出</button>
      </div>
    </div>
    <div class="layout">
      <div class="card sidebar">
        <button class="navbtn ${state.tab==='dashboard'?'active':''}" onclick="switchTab('dashboard')">總覽</button>
        <button class="navbtn ${state.tab==='forms'?'active':''}" onclick="switchTab('forms')">交接</button>
        <button class="navbtn ${state.tab==='announcements'?'active':''}" onclick="switchTab('announcements')">公告</button>
        ${state.currentUser.role === 'admin' ? `<button class="navbtn ${state.tab==='users'?'active':''}" onclick="switchTab('users')">帳號</button>` : ''}
        <div style="height:14px"></div>
        <div class="warnbox small">
          目前是正式版雛形。<br>
          已可正式試跑流程。<br>
          下一步可接 Firebase 做多人同步。
        </div>
      </div>
      <div class="content">${main}</div>
    </div>
  </div>`;
  const search = document.getElementById('searchInput');
  if (search) search.oninput = e => { state.searchText = e.target.value; render(); };

  const dateEl = document.getElementById('dateInput');
  if (dateEl) dateEl.onchange = e => { state.selectedDate = e.target.value; render(); persist(); };

  const shiftEl = document.getElementById('shiftInput');
  if (shiftEl) shiftEl.onchange = e => { state.selectedShift = e.target.value; render(); persist(); };

  const storeEl = document.getElementById('storeInput');
  if (storeEl) storeEl.onchange = e => { state.selectedStore = e.target.value; render(); persist(); };

  const nc = document.getElementById('newCategory'); if (nc) nc.onchange = e => state.newItemCategory = e.target.value;
  const nct = document.getElementById('newContent'); if (nct) nct.oninput = e => state.newItemContent = e.target.value;
  const ns = document.getElementById('newStatus'); if (ns) ns.onchange = e => state.newItemStatus = e.target.value;

  const at = document.getElementById('annTitle'); if (at) at.oninput = e => state.newAnnouncementTitle = e.target.value;
  const ac = document.getElementById('annContent'); if (ac) ac.oninput = e => state.newAnnouncementContent = e.target.value;
  const ast = document.getElementById('annStore'); if (ast) ast.onchange = e => state.newAnnouncementStore = e.target.value;

  const un = document.getElementById('userName'); if (un) un.oninput = e => state.newUserName = e.target.value;
  const ua = document.getElementById('userAccount'); if (ua) ua.oninput = e => state.newUserAccount = e.target.value;
  const up = document.getElementById('userPassword'); if (up) up.oninput = e => state.newUserPassword = e.target.value;
  const ur = document.getElementById('userRole'); if (ur) ur.onchange = e => { state.newUserRole = e.target.value; render(); };
  const us = document.getElementById('userStore'); if (us) us.onchange = e => state.newUserStore = e.target.value;
}

function render() {
  const root = document.getElementById('root');
  if (!state.currentUser) return renderLogin(root);
  return renderApp(root);
}

window.loginFromUI = login;
window.logoutFromUI = logout;
window.resetDataFromUI = resetData;
window.switchTab = function(tab){ setState({ tab }); };
window.openStoreFromUI = openStore;
window.addItemFromUI = addItem;
window.updateStatusFromUI = updateStatus;
window.addAnnouncementFromUI = addAnnouncement;
window.addUserFromUI = addUser;

render();
</script>
</body>
</html>
