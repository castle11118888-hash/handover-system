<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="交接系統" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <title>交接管理系統｜版本B.2.3</title>
  <style>
    :root{
      --bg:#f4f6fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --primary:#0f172a; --accent:#4f46e5; --ok:#16a34a; --warn:#d97706; --info:#2563eb; --danger:#dc2626; --chip:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans TC,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:1280px;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;gap:16px}
    .title{font-size:28px;font-weight:800}
    .sub{font-size:13px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:220px 1fr;gap:20px;margin-top:20px}
    .sidebar{padding:14px}
    .content{display:grid;gap:20px}
    .navbtn{width:100%;padding:12px 14px;border-radius:14px;border:none;background:transparent;text-align:left;font-size:14px;font-weight:700;cursor:pointer}
    .navbtn.active{background:var(--primary);color:#fff}
    .navbtn:hover{background:#f3f4f6}.navbtn.active:hover{background:var(--primary)}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .stat{padding:18px}.stat .num{font-size:34px;font-weight:900;margin-top:8px}
    .section{padding:18px}.section h2{margin:0 0 14px;font-size:22px}
    .toolbar,.row,.top-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .list{display:grid;gap:12px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff}
    textarea{min-height:120px;resize:vertical}
    .btn{border:none;border-radius:14px;padding:11px 16px;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--primary);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:5px 10px;border-radius:999px;background:var(--chip);font-size:12px;font-weight:700}
    .chip.ok{background:#dcfce7;color:#166534}.chip.info{background:#dbeafe;color:#1d4ed8}.chip.warn{background:#fef3c7;color:#92400e}.chip.neutral{background:#e5e7eb;color:#374151}
    .item{padding:16px;border:1px solid var(--border);border-radius:18px;background:#fff}
    .storecard{padding:16px;cursor:pointer;transition:.15s transform,.15s box-shadow}
    .storecard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .progress{height:10px;background:#edf2f7;border-radius:999px;overflow:hidden;margin-top:12px}
    .bar{height:100%;background:var(--accent)}
    .muted{color:var(--muted)} .small{font-size:13px}
    .login-wrap{max-width:1100px;margin:36px auto;padding:20px;display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
    .hero{padding:28px}.login{padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 140px;gap:10px}
    .warnbox{padding:12px 14px;border-radius:14px;background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .okbox{padding:12px 14px;border-radius:14px;background:#ecfdf5;color:#166534;border:1px solid #a7f3d0}
    .badge{display:inline-block;background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .empty{padding:26px;text-align:center;border-radius:16px;background:#f8fafc;color:var(--muted)}
    mark{background:#fde68a;padding:0 2px;border-radius:4px}
    .table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;vertical-align:top}
    .w240{width:240px}.w180{width:180px}.w140{width:140px}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{max-width:560px;width:100%;background:#fff;border-radius:20px;border:1px solid var(--border);padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
    @media (max-width:980px){
      .layout,.login-wrap{grid-template-columns:1fr}
      .grid4,.grid3{grid-template-columns:1fr 1fr}
      .grid2,.form-grid{grid-template-columns:1fr}
      .app{padding:12px}.title{font-size:22px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp, collection, addDoc, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbQf6eh1KSnZhDZeSqc4RbJDjgIpqNd-I",
  authDomain: "handover-system-cd60a.firebaseapp.com",
  projectId: "handover-system-cd60a",
  storageBucket: "handover-system-cd60a.firebasestorage.app",
  messagingSenderId: "950652925778",
  appId: "1:950652925778:web:51303af3c25a6a2cda6c8b",
  measurementId: "G-3G38YZGNCV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const shifts = ["早班","中班","晚班"];
const categories = ["人員","事情","宣導","保全","廚房","其他"];
const statuses = {
  pending: { label:"待處理", cls:"neutral" },
  in_progress: { label:"處理中", cls:"info" },
  done: { label:"已完成", cls:"ok" },
  pending_followup: { label:"待追蹤", cls:"warn" }
};
const storesSeed = [{id:"A",name:"A店"},{id:"B",name:"B店"},{id:"C",name:"C店"},{id:"D",name:"D店"}];
const today = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

let state = {
  authReady:false,currentUser:null,profile:null,
  users:[],handovers:[],announcements:[],stores:storesSeed,
  tab:"dashboard",searchText:"",
  selectedDate:today(),selectedShift:"晚班",selectedStore:"A",
  historyDate:"",historyStore:"A",historyShift:"",
  loginEmail:"",loginPassword:"",
  registerName:"",registerEmail:"",registerPassword:"",
  loginError:"",registerError:"",infoMessage:"",
  newItemCategory:"人員",newItemContent:"",newItemStatus:"pending",
  newAnnouncementTitle:"",newAnnouncementContent:"",newAnnouncementStore:"all",
  editingItemId:null,editingItemContent:"",
  showAnnouncementModal:false,lastAnnouncement:null
};
let unsubscribers = [];

const clearSubs = () => { unsubscribers.forEach(fn=>{try{fn()}catch(e){}}); unsubscribers=[]; };
const escapeHtml = s => String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
function highlightText(text, keyword){
  const src = String(text ?? ""), q = String(keyword ?? "").trim();
  if(!q) return escapeHtml(src);
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escapeHtml(src).replace(new RegExp(esc, "gi"), m => `<mark>${m}</mark>`);
}
const setState = patch => { Object.assign(state, patch); render(); };
const normalizeRole = role => role === "manager" ? "general_manager" : role === "supervisor" ? "store_supervisor" : (role || "store_supervisor");
const roleLabel = role => { const r = normalizeRole(role); return r==="admin"?"管理員":r==="general_manager"?"總經理":r==="staff"?"員工":"店主管"; };
const canViewAllStores = () => ["admin","general_manager"].includes(normalizeRole(state.profile?.role));
const canManageUsers = () => normalizeRole(state.profile?.role) === "admin";
const canPostAnnouncements = () => ["admin","general_manager"].includes(normalizeRole(state.profile?.role));
const canEditStatus = () => ["admin","general_manager","store_supervisor"].includes(normalizeRole(state.profile?.role));
const canDeleteItem = () => normalizeRole(state.profile?.role) === "admin";
const canEditItem = () => ["admin","general_manager","store_supervisor"].includes(normalizeRole(state.profile?.role));
const currentUserName = () => state.profile?.name || state.currentUser?.email || "";
const profileStoreId = profile => String(profile?.storeId || profile?.store || "").replace("店","");
const visibleStores = () => canViewAllStores() ? state.stores : state.stores.filter(s => s.id === profileStoreId(state.profile));
const effectiveStore = () => canViewAllStores() ? state.selectedStore : (profileStoreId(state.profile) || "A");

function dashboardRows(){
  return visibleStores().map(store => {
    const list = state.handovers.filter(h => h.date===state.selectedDate && h.shift===state.selectedShift && h.storeId===store.id);
    const total = list.length;
    const done = list.filter(i => i.status==="done").length;
    const abnormal = list.filter(i => ["pending","pending_followup"].includes(i.status)).length;
    return {...store,total,done,abnormal,progress: total?Math.round(done/total*100):0};
  });
}
function totals(){
  const rows = dashboardRows();
  return {
    totalItems: rows.reduce((a,b)=>a+b.total,0),
    totalDone: rows.reduce((a,b)=>a+b.done,0),
    totalAbnormal: rows.reduce((a,b)=>a+b.abnormal,0),
    avgProgress: rows.length ? Math.round(rows.reduce((a,b)=>a+b.progress,0)/rows.length) : 0
  };
}
const currentItems = () => state.handovers.filter(h => h.date===state.selectedDate && h.shift===state.selectedShift && h.storeId===effectiveStore());
const filteredItems = () => {
  const q = state.searchText.trim().toLowerCase();
  return currentItems().filter(i => !q || String(i.content).toLowerCase().includes(q) || String(i.category).toLowerCase().includes(q));
};
const historyItems = () => state.handovers
  .filter(h => (!state.historyDate || h.date===state.historyDate) && (!state.historyShift || h.shift===state.historyShift) && h.storeId===state.historyStore)
  .sort((a,b) => `${b.date}${b.shift}`.localeCompare(`${a.date}${a.shift}`));

function globalResults(){
  const q = state.searchText.trim().toLowerCase();
  if(!q) return {stores:[],items:[],announcements:[],users:[]};
  const stores = visibleStores().filter(s => s.id.toLowerCase().includes(q) || s.name.toLowerCase().includes(q));
  const items = visibleStores().flatMap(store => state.handovers
    .filter(h => h.date===state.selectedDate && h.shift===state.selectedShift && h.storeId===store.id)
    .filter(i => String(i.content).toLowerCase().includes(q) || String(i.category).toLowerCase().includes(q))
    .map(i => ({...i,storeName:store.name})));
  const announcements = state.announcements.filter(a => {
    const canView = !a.targetStoreId || a.targetStoreId===effectiveStore() || canViewAllStores();
    return canView && (String(a.title).toLowerCase().includes(q) || String(a.content).toLowerCase().includes(q) || String(a.createdByName||"").toLowerCase().includes(q));
  });
  const users = canManageUsers() ? state.users.filter(u =>
    String(u.username||u.email||"").toLowerCase().includes(q) ||
    String(u.role||"").toLowerCase().includes(q) ||
    String(u.storeId||u.store||"").toLowerCase().includes(q)
  ) : [];
  return {stores,items,announcements,users};
}
const optionHtml = (arr,val) => arr.map(v => `<option value="${escapeHtml(v)}" ${String(v)===String(val)?"selected":""}>${escapeHtml(v)}</option>`).join("");
const storeOptionsHtml = val => state.stores.map(s => `<option value="${s.id}" ${String(s.id)===String(val)?"selected":""}>${escapeHtml(s.name)}</option>`).join("");

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    setState({ profile:{id:user.uid,...data,role:normalizeRole(data.role)} });
    subscribeData();
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"staff", storeId:firstUser?null:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  setState({ profile:{id:user.uid,...profile}, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為員工 A店。" });
  subscribeData();
}
function subscribeData(){
  clearSubs();
  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => setState({handovers:snap.docs.map(d=>({id:d.id,...d.data()}))})));
  unsubscribers.push(onSnapshot(collection(db,"announcements"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({ announcements:rows, lastAnnouncement:rows[0]||null, showAnnouncementModal:!!(rows[0]&&state.currentUser) });
  }));
  unsubscribers.push(onSnapshot(collection(db,"users"), snap => setState({users:snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)}))})));
}

async function login(){
  try{
    setState({loginError:"",infoMessage:""});
    const cred = await signInWithEmailAndPassword(auth,state.loginEmail,state.loginPassword);
    await ensureProfile(cred.user);
  }catch(e){
    setState({loginError:"登入失敗，請確認 Email 與密碼。"});
  }
}
async function registerUser(){
  try{
    setState({registerError:"",infoMessage:""});
    if(!state.registerName.trim()) return setState({registerError:"請輸入姓名"});
    const cred = await createUserWithEmailAndPassword(auth,state.registerEmail,state.registerPassword);
    await ensureProfile(cred.user,state.registerName.trim());
  }catch(e){
    setState({registerError:"註冊失敗，請確認 Email 格式與密碼至少 6 碼。"});
  }
}
async function resetPassword(){
  if(!state.loginEmail.trim()) return alert("請先輸入 Email");
  await sendPasswordResetEmail(auth,state.loginEmail);
  alert("已寄出重設密碼信件");
}
async function logout(){
  clearSubs();
  await signOut(auth);
  setState({currentUser:null,profile:null,users:[],handovers:[],announcements:[],tab:"dashboard",searchText:"",showAnnouncementModal:false});
}
async function addItem(){
  const content = state.newItemContent.trim();
  if(!content) return;
  await addDoc(collection(db,"handovers"),{
    date:state.selectedDate,shift:state.selectedShift,storeId:effectiveStore(),category:state.newItemCategory,
    content,status:state.newItemStatus,carried:false,createdByUid:state.currentUser.uid,createdByName:currentUserName(),
    createdAt:serverTimestamp(),updatedAt:serverTimestamp()
  });
  setState({newItemContent:"",newItemCategory:"人員",newItemStatus:"pending"});
}
async function updateStatus(id,value){
  if(!canEditStatus()) return alert("你沒有修改狀態的權限");
  await updateDoc(doc(db,"handovers",id),{status:value,updatedAt:serverTimestamp()});
}
async function deleteItem(id){
  if(!canDeleteItem()) return alert("只有管理員可刪除");
  await deleteDoc(doc(db,"handovers",id));
}
function startEditItem(id,content){ setState({editingItemId:id,editingItemContent:content}); }
async function saveEditItem(){
  if(!state.editingItemId) return;
  await updateDoc(doc(db,"handovers",state.editingItemId),{content:state.editingItemContent,updatedAt:serverTimestamp()});
  setState({editingItemId:null,editingItemContent:""});
}
async function addAnnouncement(){
  if(!canPostAnnouncements()) return alert("只有管理員或總經理可發公告");
  const title = state.newAnnouncementTitle.trim(), content = state.newAnnouncementContent.trim();
  if(!title || !content) return;
  await addDoc(collection(db,"announcements"),{
    title,content,targetStoreId:state.newAnnouncementStore==="all"?null:state.newAnnouncementStore,
    createdByUid:state.currentUser.uid,createdByName:currentUserName(),createdAt:serverTimestamp()
  });
  setState({newAnnouncementTitle:"",newAnnouncementContent:"",newAnnouncementStore:"all"});
}
async function deleteAnnouncement(id){
  if(!canPostAnnouncements()) return alert("你沒有刪除公告權限");
  await deleteDoc(doc(db,"announcements",id));
}
async function saveUserRole(uid, role, storeId){
  if(!canManageUsers()) return alert("只有管理員可調整帳號");
  const r = normalizeRole(role);
  const payload = {
    role: r,
    updatedAt: serverTimestamp()
  };
  if(["store_supervisor","staff"].includes(r)){
    payload.storeId = storeId || "A";
  }else{
    payload.storeId = null;
  }
  await updateDoc(doc(db,"users",uid), payload);
}
async function disableUser(uid){
  if(!canManageUsers()) return alert("只有管理員可刪除帳號");
  if(state.currentUser && uid===state.currentUser.uid) return alert("不能刪除目前登入的管理員本人");
  if(!confirm("確定要刪除這個帳號嗎？刪除後此帳號將無法登入。")) return;
  await updateDoc(doc(db,"users",uid),{active:false,deletedAt:serverTimestamp()});
}
const openStore = id => setState({selectedStore:id,tab:"forms"});

function renderLogin(root){
  root.innerHTML = `
  <div class="login-wrap">
    <div class="card hero">
      <div class="badge">版本 B.2.3</div>
      <div class="title" style="margin-top:12px">交接管理系統</div>
      <p class="muted" style="font-size:18px;line-height:1.8">版本 B.2.3 已加入：角色中文化、角色儲存修正、帳號管理優化、歷史查詢、密碼重設、手機版優化。</p>
      <div class="grid4" style="margin-top:18px">
        <div class="card stat"><div class="sub">角色權限</div><div class="num">完整</div><div class="sub">顯示修正完成</div></div>
        <div class="card stat"><div class="sub">公告</div><div class="num">可刪</div><div class="sub">管理員 / 總經理</div></div>
        <div class="card stat"><div class="sub">交接</div><div class="num">可編輯</div><div class="sub">主管以上</div></div>
        <div class="card stat"><div class="sub">歷史</div><div class="num">可查</div><div class="sub">依日期店別班別</div></div>
      </div>
      ${state.infoMessage ? `<div style="height:12px"></div><div class="okbox">${escapeHtml(state.infoMessage)}</div>` : ""}
    </div>
    <div style="display:grid;gap:20px">
      <div class="card login">
        <h2 style="margin-top:0">登入系統</h2>
        <label class="small muted">Email</label>
        <input id="loginEmail" type="email" placeholder="請輸入 Email">
        <div style="height:10px"></div>
        <label class="small muted">密碼</label>
        <input id="loginPassword" type="password" placeholder="至少 6 碼">
        ${state.loginError ? `<div style="height:10px"></div><div class="warnbox">${escapeHtml(state.loginError)}</div>` : ""}
        <div style="height:14px"></div>
        <button class="btn primary" style="width:100%" onclick="loginFromUI()">登入</button>
        <div style="height:10px"></div>
        <button class="btn secondary" style="width:100%" onclick="resetPasswordFromUI()">忘記密碼</button>
      </div>
      <div class="card login">
        <h2 style="margin-top:0">建立新帳號</h2>
        <label class="small muted">姓名</label>
        <input id="registerName" placeholder="請輸入姓名">
        <div style="height:10px"></div>
        <label class="small muted">Email</label>
        <input id="registerEmail" type="email" placeholder="請輸入 Email">
        <div style="height:10px"></div>
        <label class="small muted">密碼</label>
        <input id="registerPassword" type="password" placeholder="至少 6 碼">
        ${state.registerError ? `<div style="height:10px"></div><div class="warnbox">${escapeHtml(state.registerError)}</div>` : ""}
        <div style="height:14px"></div>
        <button class="btn secondary" style="width:100%" onclick="registerFromUI()">註冊</button>
      </div>
    </div>
  </div>`;
  document.getElementById("loginEmail").oninput = e => state.loginEmail = e.target.value;
  document.getElementById("loginPassword").oninput = e => state.loginPassword = e.target.value;
  document.getElementById("registerName").oninput = e => state.registerName = e.target.value;
  document.getElementById("registerEmail").oninput = e => state.registerEmail = e.target.value;
  document.getElementById("registerPassword").oninput = e => state.registerPassword = e.target.value;
}

function renderDashboard(){
  const t = totals(), rows = dashboardRows(), results = globalResults();
  if(!state.searchText.trim()){
    return `
    <div class="grid4">
      <div class="card stat"><div class="sub">交接總數</div><div class="num">${t.totalItems}</div><div class="sub">目前合計</div></div>
      <div class="card stat"><div class="sub">已完成</div><div class="num">${t.totalDone}</div><div class="sub">完成數</div></div>
      <div class="card stat"><div class="sub">待處理</div><div class="num">${t.totalAbnormal}</div><div class="sub">需追蹤</div></div>
      <div class="card stat"><div class="sub">平均進度</div><div class="num">${t.avgProgress}%</div><div class="sub">全店平均</div></div>
    </div>
    <div class="card section">
      <h2>各店進度</h2>
      <div class="grid4">
        ${rows.map(row => `
          <div class="card storecard" onclick="openStoreFromUI('${row.id}')">
            <div class="row" style="justify-content:space-between;align-items:center">
              <div style="font-size:20px;font-weight:800">${escapeHtml(row.name)}</div>
              <div class="chip">${row.total} 項</div>
            </div>
            <div class="progress"><div class="bar" style="width:${row.progress}%"></div></div>
            <div class="small muted" style="margin-top:8px">完成 ${row.progress}%</div>
            <div class="grid2" style="margin-top:12px">
              <div class="card stat" style="padding:12px"><div class="sub">已完成</div><div class="num" style="font-size:22px">${row.done}</div></div>
              <div class="card stat" style="padding:12px"><div class="sub">待處理</div><div class="num" style="font-size:22px">${row.abnormal}</div></div>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  }
  return `
  <div class="card section">
    <h2>全站搜尋</h2>
    <div class="list">
      <div class="item"><div class="small muted">店別 ${results.stores.length}</div>${results.stores.length ? results.stores.map(s=>`<div style="margin-top:8px">${highlightText(`${s.id}｜${s.name}`,state.searchText)}</div>`).join("") : '<div class="empty">找不到店別</div>'}</div>
      <div class="item"><div class="small muted">交接 ${results.items.length}</div>${results.items.length ? results.items.map(i=>`<div style="margin-top:10px"><div class="small muted">${escapeHtml(i.storeName)}｜${escapeHtml(i.category)}</div><div>${highlightText(i.content,state.searchText)}</div></div>`).join("") : '<div class="empty">找不到交接</div>'}</div>
      <div class="item"><div class="small muted">公告 ${results.announcements.length}</div>${results.announcements.length ? results.announcements.map(a=>`<div style="margin-top:10px"><div style="font-weight:800">${highlightText(a.title,state.searchText)}</div><div class="small muted">${escapeHtml(a.createdByName||"")}</div><div>${highlightText(a.content,state.searchText)}</div></div>`).join("") : '<div class="empty">找不到公告</div>'}</div>
      ${canManageUsers() ? `<div class="item"><div class="small muted">帳號 ${results.users.length}</div>${results.users.length ? results.users.map(u=>`<div style="margin-top:10px">${highlightText(`${u.username||u.email}｜${normalizeRole(u.role)}｜${u.storeId||u.store||"-"}`,state.searchText)}</div>`).join("") : '<div class="empty">找不到帳號</div>'}</div>` : ""}
    </div>
  </div>`;
}

function itemCard(item){
  return `
  <div class="item">
    <div class="chips">
      <span class="chip">${escapeHtml(item.category)}</span>
      <span class="chip ${statuses[item.status]?.cls || "neutral"}">${escapeHtml(statuses[item.status]?.label || item.status)}</span>
    </div>
    <div style="margin-top:12px;line-height:1.8">${highlightText(item.content,state.searchText)}</div>
    <div class="small muted" style="margin-top:8px">${escapeHtml(item.createdByName||"")}</div>
    <div class="row" style="margin-top:12px">
      ${canEditStatus() ? `<select onchange="updateStatusFromUI('${item.id}', this.value)">${Object.keys(statuses).map(k=>`<option value="${k}" ${item.status===k?"selected":""}>${statuses[k].label}</option>`).join("")}</select>` : `<div class="chip ${statuses[item.status]?.cls || "neutral"}">${escapeHtml(statuses[item.status]?.label || item.status)}</div>`}
      ${canEditItem() ? `<button class="btn secondary" onclick="startEditItemFromUI('${item.id}', ${JSON.stringify(item.content).replace(/"/g,'&quot;')})">編輯</button>` : ""}
      ${canDeleteItem() ? `<button class="btn danger" onclick="deleteItemFromUI('${item.id}')">刪除</button>` : ""}
    </div>
  </div>`;
}

function renderForms(){
  const items = filteredItems();
  return `
  <div class="card section">
    <h2>新增交接</h2>
    <div class="form-grid">
      <select id="newCategory">${optionHtml(categories,state.newItemCategory)}</select>
      <input id="newContent" placeholder="輸入交接內容" value="${escapeHtml(state.newItemContent)}">
      <select id="newStatus">${Object.keys(statuses).map(k=>`<option value="${k}" ${state.newItemStatus===k?"selected":""}>${statuses[k].label}</option>`).join("")}</select>
      <button class="btn primary" onclick="addItemFromUI()">新增</button>
    </div>
  </div>
  <div class="card section">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h2 style="margin:0">交接事項</h2>
      <div class="toolbar">
        <input class="w180" type="date" id="dateInput" value="${escapeHtml(state.selectedDate)}">
        <select class="w140" id="shiftInput">${optionHtml(shifts,state.selectedShift)}</select>
        <select class="w180" id="storeInput" ${canViewAllStores()?"":"disabled"}>${storeOptionsHtml(effectiveStore())}</select>
      </div>
    </div>
    <div style="height:12px"></div>
    ${items.length ? `<div class="list">${items.map(itemCard).join("")}</div>` : `<div class="empty">目前沒有資料</div>`}
  </div>`;
}

function renderAnnouncements(){
  const list = state.announcements.filter(a => !a.targetStoreId || a.targetStoreId===effectiveStore() || canViewAllStores());
  return `
  <div class="grid2">
    ${canPostAnnouncements() ? `
    <div class="card section">
      <h2>發公告</h2>
      <input id="annTitle" placeholder="標題" value="${escapeHtml(state.newAnnouncementTitle)}">
      <div style="height:10px"></div>
      <textarea id="annContent" placeholder="內容">${escapeHtml(state.newAnnouncementContent)}</textarea>
      <div style="height:10px"></div>
      <select id="annStore">
        <option value="all" ${state.newAnnouncementStore==="all"?"selected":""}>全店</option>
        ${storeOptionsHtml(state.newAnnouncementStore)}
      </select>
      <div style="height:12px"></div>
      <button class="btn primary" onclick="addAnnouncementFromUI()">發公告</button>
    </div>` : `
    <div class="card section"><h2>公告</h2><div class="warnbox">你目前只有查看公告權限。</div></div>`}
    <div class="card section">
      <h2>公告清單</h2>
      <div class="list">
        ${list.map(a => `
          <div class="item">
            <div class="row" style="justify-content:space-between;align-items:flex-start">
              <div>
                <div style="font-size:18px;font-weight:800">${escapeHtml(a.title)}</div>
                <div class="small muted">${escapeHtml(a.createdByName||"")}</div>
              </div>
              <div class="row">
                <div class="chip">${a.targetStoreId ? escapeHtml(a.targetStoreId+"店") : "全店"}</div>
                ${canPostAnnouncements() ? `<button class="btn danger" onclick="deleteAnnouncementFromUI('${a.id}')">刪除</button>` : ""}
              </div>
            </div>
            <div style="margin-top:10px;line-height:1.8">${highlightText(a.content,state.searchText)}</div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function renderUsers(){
  return `
  <div class="card section">
    <h2>帳號管理</h2>
    <div class="okbox">管理員可調整角色與店別。角色已改為中文顯示；管理員 / 總經理不綁店別，店主管 / 員工需指定店別。</div>
  </div>
  <div class="card section">
    <table class="table">
      <thead><tr><th>帳號</th><th>姓名 / Email</th><th>狀態</th><th>角色</th><th>店別</th><th>目前權限</th><th>動作</th></tr></thead>
      <tbody>
        ${state.users.map(u => {
          const role = normalizeRole(u.role);
          const disabled = u.active===false ? 'disabled' : '';
          const selfDisabled = state.currentUser && u.id===state.currentUser.uid ? 'disabled' : '';
          const storeText = ["admin","general_manager"].includes(role) ? "全店" : ((state.stores.find(s => s.id===String(u.storeId||u.store||''))?.name) || ((u.storeId||u.store) ? `${u.storeId||u.store}店` : "未設定"));
          return `
          <tr>
            <td>${escapeHtml(u.username||"-")}</td>
            <td>${escapeHtml(u.name||u.email||"-")}</td>
            <td>${u.active===false?'<span class="chip warn">已停用</span>':'<span class="chip ok">正常</span>'}</td>
            <td>
              <select id="role_${u.id}" ${disabled}>
                <option value="admin" ${role==="admin"?"selected":""}>管理員</option>
                <option value="general_manager" ${role==="general_manager"?"selected":""}>總經理</option>
                <option value="store_supervisor" ${role==="store_supervisor"?"selected":""}>店主管</option>
                <option value="staff" ${role==="staff"?"selected":""}>員工</option>
              </select>
            </td>
            <td><select id="store_${u.id}" ${disabled}><option value="">-</option>${storeOptionsHtml(u.storeId||"")}</select></td>
            <td><span class="chip info">${escapeHtml(roleLabel(role))}｜${escapeHtml(storeText)}</span></td>
            <td><div class="row"><button class="btn secondary" onclick="saveUserRoleFromUI('${u.id}')" ${disabled}>儲存</button><button class="btn danger" onclick="disableUserFromUI('${u.id}')" ${selfDisabled}>刪除</button></div></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
  </div>`;
}

function renderHistory(){
  const items = historyItems();
  return `
  <div class="card section">
    <h2>交接歷史查詢</h2>
    <div class="grid3">
      <input type="date" id="historyDate" value="${escapeHtml(state.historyDate)}">
      <select id="historyStore">${storeOptionsHtml(state.historyStore)}</select>
      <select id="historyShift"><option value="">全部班別</option>${optionHtml(shifts,state.historyShift)}</select>
    </div>
    <div style="height:12px"></div>
    ${items.length ? `<div class="list">${items.map(i=>`
      <div class="item">
        <div class="chips">
          <span class="chip">${escapeHtml(i.date)}</span>
          <span class="chip">${escapeHtml(i.shift)}</span>
          <span class="chip">${escapeHtml(i.storeId)}店</span>
          <span class="chip ${statuses[i.status]?.cls||"neutral"}">${escapeHtml(statuses[i.status]?.label||i.status)}</span>
        </div>
        <div style="margin-top:10px">${escapeHtml(i.content)}</div>
        <div class="small muted" style="margin-top:8px">${escapeHtml(i.createdByName||"")}</div>
      </div>`).join("")}</div>` : `<div class="empty">查無資料</div>`}
  </div>`;
}

function renderAnnouncementModal(){
  if(!state.showAnnouncementModal || !state.lastAnnouncement) return "";
  return `
  <div class="modalbg" onclick="closeAnnouncementModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="badge">最新公告</div>
      <h2 style="margin:12px 0 8px">${escapeHtml(state.lastAnnouncement.title||"")}</h2>
      <div class="small muted">${escapeHtml(state.lastAnnouncement.createdByName||"")}</div>
      <div style="margin-top:12px;line-height:1.8">${escapeHtml(state.lastAnnouncement.content||"")}</div>
      <div style="height:16px"></div>
      <button class="btn primary" style="width:100%" onclick="closeAnnouncementModal()">我知道了</button>
    </div>
  </div>`;
}
function renderEditModal(){
  if(!state.editingItemId) return "";
  return `
  <div class="modalbg" onclick="cancelEditItem()">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 style="margin-top:0">編輯交接內容</h2>
      <textarea id="editContent">${escapeHtml(state.editingItemContent)}</textarea>
      <div style="height:12px"></div>
      <div class="row">
        <button class="btn secondary" onclick="cancelEditItem()">取消</button>
        <button class="btn primary" onclick="saveEditItemFromUI()">儲存</button>
      </div>
    </div>
  </div>`;
}

function renderApp(root){
  const main = state.tab==="dashboard" ? renderDashboard()
    : state.tab==="forms" ? renderForms()
    : state.tab==="announcements" ? renderAnnouncements()
    : state.tab==="history" ? renderHistory()
    : renderUsers();

  root.innerHTML = `
  <div class="app">
    <div class="card topbar">
      <div>
        <div class="title">交接管理後台</div>
        <div class="sub">${escapeHtml(currentUserName())}｜${roleLabel(state.profile?.role)}｜${canViewAllStores()?"全店":escapeHtml(effectiveStore()+"店")}｜${escapeHtml(state.selectedDate)}｜${escapeHtml(state.selectedShift)}</div>
      </div>
      <div class="top-actions">
        <input class="w240" id="searchInput" placeholder="全站搜尋" value="${escapeHtml(state.searchText)}">
        <button class="btn secondary" onclick="resetFiltersFromUI()">重設篩選</button>
        <button class="btn primary" onclick="logoutFromUI()">登出</button>
      </div>
    </div>
    <div class="layout">
      <div class="card sidebar">
        <button class="navbtn ${state.tab==="dashboard"?"active":""}" onclick="switchTab('dashboard')">總覽</button>
        <button class="navbtn ${state.tab==="forms"?"active":""}" onclick="switchTab('forms')">交接</button>
        <button class="navbtn ${state.tab==="announcements"?"active":""}" onclick="switchTab('announcements')">公告</button>
        <button class="navbtn ${state.tab==="history"?"active":""}" onclick="switchTab('history')">歷史</button>
        ${canManageUsers() ? `<button class="navbtn ${state.tab==="users"?"active":""}" onclick="switchTab('users')">帳號</button>` : ""}
        <div style="height:14px"></div>
        <div class="okbox small">
          版本 B.2.3 已啟用：<br>
          ・角色中文顯示<br>
          ・角色儲存修正<br>
          ・帳號頁操作優化<br>
          ・歷史查詢<br>
          ・密碼重設
        </div>
      </div>
      <div class="content">${main}</div>
    </div>
    ${renderAnnouncementModal()}
    ${renderEditModal()}
  </div>`;

  const search = document.getElementById("searchInput");
  if(search){
    search.oninput = e => {
      const val=e.target.value; const pos=e.target.selectionStart;
      setState({searchText:val});
      requestAnimationFrame(()=>{ const s=document.getElementById("searchInput"); if(s){ s.focus(); try{s.setSelectionRange(pos,pos)}catch(err){} } });
    };
  }
  const date = document.getElementById("dateInput"); if(date) date.onchange = e => setState({selectedDate:e.target.value});
  const shift = document.getElementById("shiftInput"); if(shift) shift.onchange = e => setState({selectedShift:e.target.value});
  const store = document.getElementById("storeInput"); if(store) store.onchange = e => setState({selectedStore:e.target.value});
  const hdate = document.getElementById("historyDate"); if(hdate) hdate.onchange = e => setState({historyDate:e.target.value});
  const hstore = document.getElementById("historyStore"); if(hstore) hstore.onchange = e => setState({historyStore:e.target.value});
  const hshift = document.getElementById("historyShift"); if(hshift) hshift.onchange = e => setState({historyShift:e.target.value});
  const nc = document.getElementById("newCategory"); if(nc) nc.onchange = e => state.newItemCategory = e.target.value;
  const nct = document.getElementById("newContent"); if(nct) nct.oninput = e => state.newItemContent = e.target.value;
  const ns = document.getElementById("newStatus"); if(ns) ns.onchange = e => state.newItemStatus = e.target.value;
  const at = document.getElementById("annTitle"); if(at) at.oninput = e => state.newAnnouncementTitle = e.target.value;
  const ac = document.getElementById("annContent"); if(ac) ac.oninput = e => state.newAnnouncementContent = e.target.value;
  const ast = document.getElementById("annStore"); if(ast) ast.onchange = e => state.newAnnouncementStore = e.target.value;
  state.users.forEach(u => {
    const roleEl = document.getElementById(`role_${u.id}`);
    const storeEl = document.getElementById(`store_${u.id}`);
    if(roleEl && storeEl){
      const syncStoreLock = () => {
        const role = normalizeRole(roleEl.value);
        if(["admin","general_manager"].includes(role)){
          storeEl.value = "";
          storeEl.disabled = true;
        }else{
          if(u.active!==false) storeEl.disabled = false;
          if(!storeEl.value) storeEl.value = u.storeId || "A";
        }
      };
      roleEl.onchange = syncStoreLock;
      syncStoreLock();
    }
  });
  const ec = document.getElementById("editContent"); if(ec) ec.oninput = e => state.editingItemContent = e.target.value;
}

function render(){
  const root = document.getElementById("root");
  if(!state.authReady){
    root.innerHTML = '<div class="app"><div class="card loading">讀取中...</div></div>';
    return;
  }
  if(!state.currentUser || !state.profile){ renderLogin(root); return; }
  renderApp(root);
}

window.loginFromUI = login;
window.registerFromUI = registerUser;
window.resetPasswordFromUI = resetPassword;
window.logoutFromUI = logout;
window.openStoreFromUI = openStore;
window.addItemFromUI = addItem;
window.updateStatusFromUI = updateStatus;
window.deleteItemFromUI = deleteItem;
window.addAnnouncementFromUI = addAnnouncement;
window.deleteAnnouncementFromUI = deleteAnnouncement;
window.switchTab = tab => setState({tab});
window.resetFiltersFromUI = () => setState({searchText:"",selectedDate:today(),selectedShift:"晚班",selectedStore:canViewAllStores()?"A":(profileStoreId(state.profile)||"A")});
window.saveUserRoleFromUI = async uid => {
  const role = document.getElementById(`role_${uid}`).value;
  const storeId = document.getElementById(`store_${uid}`).value || null;
  await saveUserRole(uid, role, storeId);
  const roleText = roleLabel(role);
  const storeText = ["admin","general_manager"].includes(normalizeRole(role)) ? "全店" : ((state.stores.find(s => s.id===storeId)?.name) || (storeId ? `${storeId}店` : "未設定"));
  alert(`已儲存：${roleText}｜${storeText}`);
};
window.closeAnnouncementModal = () => setState({showAnnouncementModal:false});
window.startEditItemFromUI = (id,content) => setState({editingItemId:id,editingItemContent:content});
window.cancelEditItem = () => setState({editingItemId:null,editingItemContent:""});
window.saveEditItemFromUI = saveEditItem;
window.disableUserFromUI = disableUser;
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}

onAuthStateChanged(auth, async user => {
  clearSubs();
  if(user){
    setState({currentUser:user,authReady:true});
    await ensureProfile(user);
  }else{
    setState({currentUser:null,profile:null,authReady:true,users:[],handovers:[],announcements:[],showAnnouncementModal:false});
  }
});

render();
</script>
</body>
</html>
