<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>交接系統 B4.6</title>
<style>
body { font-family: Arial; padding: 20px; }
.item { border:1px solid #ccc; padding:10px; margin:5px; cursor:pointer; }
.unread { color:red; }
.read { color:green; }
</style>
</head>
<body>
<h2>交接系統 B4.6</h2>
<div id="list"></div>
<script>
let currentUser = "user1";

let data = [
  { title:"交接1", content:"內容1", readBy:[] },
  { title:"交接2", content:"內容2", readBy:["user1"] }
];

function render(){
  let html="";
  data.forEach((item,i)=>{
    let isRead = item.readBy.includes(currentUser);
    html += `
      <div class="item" onclick="openItem(${i})">
        ${isRead ? "✔ 已讀" : "<span class='unread'>未讀</span>"} - ${item.title}
      </div>
    `;
  });
  document.getElementById("list").innerHTML = html;
}

function openItem(i){
  let item = data[i];
  if(!item.readBy.includes(currentUser)){
    item.readBy.push(currentUser);
  }
  alert(item.content);
  render();
}

render();
</script>
</body>
</html>
